services:
  nexus-db-v2:
    image: postgres:15-alpine
    container_name: nexus-db-v2
    restart: always
    environment:
      POSTGRES_USER: dark_admin
      POSTGRES_PASSWORD: nexus_secret_v2_777
      POSTGRES_DB: darkpay_nexus_v2
    ports:
      - "5433:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data

  nexus-redis-v2:
    image: redis:7-alpine
    container_name: nexus-redis-v2
    restart: always
    ports:
      - "6380:6379"

  nexus-api-v2:
    build: .
    container_name: nexus-api-v2
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env # ❤️ Carrega as variáveis de ambiente automaticamente!
    environment:
      DATABASE_URL: postgresql+asyncpg://dark_admin:nexus_secret_v2_777@nexus-db-v2:5432/darkpay_nexus_v2
      REDIS_URL: redis://nexus-redis-v2:6379/0
      ENVIRONMENT: staging
    depends_on:
      - nexus-db-v2
      - nexus-redis-v2
    volumes:
      - .:/app
